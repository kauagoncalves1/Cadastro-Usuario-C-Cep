<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <form id="formulario">

        <h2>Criar conta</h2>

        <p>Crie sua Conta para poder logar na plataforma</p>

        <label for="nome">Nome </label>
        <input type="text" id="nome">
        <span id="mensagem-nome"></span>

        <label for="email">E-mail</label>
        <input type="email" id="email">
        <span id="mensagem-email"></span>

        <label for="senha">Senha</label>
        <div>
            <input type="password" id="senha" min="1" max="9" >
            <button type="button" id="ver-senha"><i class="fa-regular fa-eye"></i></button>
        </div>
        <span id="mensagem-senha"></span>

        <ul id="requisitos">
            <li id="req-tamanho">Mínimo 6 caracteres</li>
            <li id="req-maiuscula">Uma letra Maiuscula</li>
            <li id="req-minuscula">Uma letra minuscula</li>
            <li id="req-especial">Um caractere especial (!@#$%&.*)</li>
        </ul>

        <label for="confirmar-senha">Confirmar Senha</label>
        <input type="password" id="confirmar-senha" min="1" max="9">
        <span id="mensagem-confirmar-senha"></span>

        <label for="cep">CEP</label>
        <input type="text" id="cep">
        <span id="mensagem-cep"></span>

        <label for="rua">Rua</label>
        <input type="text" id="rua">

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro">

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade">

        <label for="estado">Estado</label>
        <input type="text" id="estado">

        <button type="submit">Cadastrar</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
